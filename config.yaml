session:
  path: data/session.json
  persistent_profile_dir: data/camoufox_profile
  apply_cookie_overlay: false
  auto_relogin: true
presets:
  enabled: false
  name: ''
active_account: account-1
groups:
  source: data/groups.json
  blacklist: data/blacklist.txt
  rescrape_every_days: 7
  scrape:
    max_scrolls: 30
    idle_rounds_to_stop: 4
    scroll_wait_ms: 1400
    min_scroll_rounds_before_stop: 8
posting:
  template_file: post_1.yaml
  min_delay_minutes: 1
  max_delay_minutes: 3
  max_posts_per_session: 1000
  cooldown_hours: 24
  rest_every_n_posts: 10
  rest_duration_minutes: 10
  auto_skip: true
  dry_run: true
browser:
  headless: true
  locale: id-ID
  timezone: Asia/Jakarta
  humanize: false
  fullscreen: true
  screen_max_width: 1536
  screen_max_height: 864
  window_width: 1536
  window_height: 864
camoufox:
  geoip: false
  os: windows
  proxy: {}
paths:
  queue_state: data/queue_state.json
  posted_log: data/logs/posted_log.json
  screenshots: logs/screenshots
error_handling:
  retry_max_attempts: 2
  retry_backoff_seconds: 3
  screenshot_on_failure: true
  mark_inactive_on_404: true
  pause_on_captcha: true
  stop_on_rate_limit: true
  captcha_keywords:
  - captcha
  - checkpoint
  - verify you are human
  rate_limit_keywords:
  - try again later
  - temporarily blocked
  - you've been restricted
commenting:
  template_file: post_1.yaml
  min_delay_minutes: 1
  max_delay_minutes: 3
accounts:
  account-1:
    enabled: true
    session:
      path: data/accounts/account-1/session.json
      persistent_profile_dir: data/accounts/account-1/camoufox_profile
    groups:
      source: data/accounts/account-1/groups.json
      blacklist: data/accounts/account-1/blacklist.txt
    paths:
      queue_state: data/accounts/account-1/queue_state.json
      posted_log: data/accounts/account-1/logs/posted_log.json
      screenshots: data/accounts/account-1/logs/screenshots
    posting:
      template_file: post_1.yaml
    schedules: []
