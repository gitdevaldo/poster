title: VPS + Github Student Offer
text: |
  #WTS Habis lebaran, waktunya produktif lagi!

  Ready VPS DO super murah dan full garansi pastinya :D
  - OS: Ubuntu, Fedora, Debian, CentOS, Alma, Rocky, Windows (khusus windows wajib instal ulang manual~ nanti di ajarin)
  - Region: SG, US, CA, UK, NL
  - Harga bisa langsung cek gambar.

  Ready juga akun Github Student Developer Pack~

  - Gratis Domain 2 Domain dari Name, 1 Domain Namecheap, 1 Domain tech
  - Gratis $200 dari DigitalOcean
  - Gratis Copilot Student 1 tahun!
  - Gratis $100 dari Microsoft Azure
  - dan masih banyak offer lainnya

  Harga: 100K/akun

  Open juga untuk jasa apply akun Student Developer Pack (akun github dari kamu, ya). Harganya jauh lebih murah, cuma 10K/akun (tapi nggak ada garansi :D)

  Gass, yang lagi butuh akun Github bisa langsung PM aja gan :)

  ***
  - Garansi VPS DO full1 1 bulan (1x ganti)
  - Garansi akun Github full 1 tahun (1x ganti)
  - Garansi hangus kalau VPS digunakan untuk aktivitas ilegal (misalnya: spamming, phising, torrents, copyright.
  - VPS bisa di extend/perpanjang (durasi tidak menentu)
  - Akun Github sudah full approve, tinggal claim offer saja
